<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Henrique Cunha</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #070a12;
      --panel: rgba(16, 23, 39, .88);
      --text: #f3f7ff;
      --muted: #aebbd0;
      --line: rgba(158, 177, 210, .22);
      --cyan: #74d6ff;
      --green: #8ff0c6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 12%, rgba(116,214,255,.17), transparent 25rem),
        linear-gradient(180deg, #05070d, var(--bg));
      font: 16px/1.6 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(720px, 100%);
      padding: clamp(28px, 7vw, 58px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0,0,0,.34);
    }

    span {
      color: var(--cyan);
      font: 800 .82rem "JetBrains Mono", ui-monospace, monospace;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 16px;
      font-size: clamp(2.4rem, 9vw, 5rem);
      line-height: 1;
    }

    p {
      color: var(--muted);
    }

    a {
      display: inline-flex;
      margin-top: 20px;
      padding: 11px 14px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      color: #061015;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <span>404 / route not in scope</span>
    <h1>Page not found.</h1>
    <p>This route is outside the portfolio map. Return to the main page to inspect Henrique Cunha's ethical hacking, Red Team and technical projects.</p>
    <a href="/">Back to portfolio</a>
  </main>
</body>
</html>
